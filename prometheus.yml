global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'jetson-devices'
    scrape_interval: 30s
    static_configs:
      - targets:
          - '20.8.0.42:9100'
          - '20.8.0.43:9100'
          - '20.8.0.44:9100'
          - '20.8.0.45:9100'
          - '20.8.0.46:9100'
        labels:
          site: 'PVIS-1'
          device_type: 'jetson-orin-nx'
          project: 'indian-railways'
      - targets:
          - '20.8.0.47:9100'
          - '20.8.0.48:9100'
          - '20.8.0.49:9100'
          - '20.8.0.50:9100'
          - '20.8.0.51:9100'
        labels:
          site: 'PVIS-2'
          device_type: 'jetson-orin-nx'
          project: 'indian-railways'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []
